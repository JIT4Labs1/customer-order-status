name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Also deploy after the Refresh button rebuilds the page. The refresh workflow
  # commits with the built-in GITHUB_TOKEN, which does NOT trigger a `push`-based
  # deploy. `workflow_run` fires across that boundary, so the freshly committed
  # data actually gets published.
  workflow_run:
    workflows: ["Refresh Open Orders Page"]
    types: [completed]

# Allow this workflow to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish (no failed collisions)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # For refresh-triggered runs, only deploy when the refresh actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always publish the current tip of main (includes the refresh commit).
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload entire repo as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
